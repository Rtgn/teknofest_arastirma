<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Symbiosis v2{% endblock %} · OSB</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">S</div>
      <div class="brand-text">
        <span class="brand-title">Symbiosis <em>v2</em></span>
        <span class="brand-sub">OSB endüstriyel simbiyoz</span>
      </div>
    </div>
    <div class="sidebar-menu">
      <span class="menu-label">Menü</span>
      <a href="{{ url_for('index') }}" class="menu-item {% if request.endpoint == 'index' %}active{% endif %}">
        <span class="menu-icon">◆</span><span>Özet</span>
      </a>
      <a href="{{ url_for('network_page') }}" class="menu-item {% if request.endpoint == 'network_page' %}active{% endif %}">
        <span class="menu-icon">◇</span><span>Ağ haritası</span>
      </a>
      <a href="{{ url_for('pipeline_page') }}" class="menu-item {% if request.endpoint == 'pipeline_page' %}active{% endif %}">
        <span class="menu-icon">◈</span><span>Veri &amp; pipeline</span>
      </a>
      <a href="{{ url_for('monthly_data_page') }}" class="menu-item {% if request.endpoint == 'monthly_data_page' %}active{% endif %}">
        <span class="menu-icon">▤</span><span>Aylık veri</span>
      </a>
      <a href="{{ url_for('simulation_page') }}" class="menu-item {% if request.endpoint == 'simulation_page' %}active{% endif %}">
        <span class="menu-icon">◉</span><span>Dijital ikiz</span>
      </a>
    </div>
    <div class="sidebar-footer">
      <div>Girdi kökü</div>
      <code>outputs/runtime/</code>
    </div>
  </nav>

  <main class="main-content">
    <div class="topbar">
      <h1 class="page-title">{% block page_title %}Özet{% endblock %}</h1>
      <div class="topbar-right">
        <span class="live-badge">Yerel oturum</span>
      </div>
    </div>
    <div class="content-area">
      {% block content %}{% endblock %}
    </div>
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
